<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Field Converter</title>
  <style>
    body { width: 450px; padding: 15px; font-family: Arial, sans-serif; background: #f5f5f5; }
    .form-group { margin-bottom: 15px; background: white; padding: 10px; border-radius: 4px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
    textarea, input[type="file"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    textarea { font-family: monospace; font-size: 12px; }
    button { width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .button-group { display: flex; gap: 10px; }
    .button-group button { flex: 1; }
    #convertBtn { background-color: #4CAF50; color: white; }
    #convertBtn:hover { background-color: #45a049; }
    #downloadBtn { background-color: #2196F3; color: white; }
    #downloadBtn:hover { background-color: #0b7dda; }
    #settingsBtn { background-color: #FF9800; color: white; }
    #settingsBtn:hover { background-color: #e68900; }
    #resetBtn { background-color: #f44336; color: white; }
    #resetBtn:hover { background-color: #da190b; }
    #fieldPreview { height: 100px; }
    #outputJson { height: 120px; }
    .status { margin-top: 10px; padding: 8px; border-radius: 4px; display: none; font-size: 12px; }
    .status.loading { background-color: #e3f2fd; color: #1976d2; display: block; }
    .status.success { background-color: #c8e6c9; color: #2e7d32; display: block; }
    .status.error { background-color: #ffcdd2; color: #c62828; display: block; }
    .file-name { font-size: 12px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>
  <h2>📊 电商数据字段转换工具</h2>
  
  <div class="form-group">
    <label for="jsonFile">📁 上传JSON文件:</label>
    <input type="file" id="jsonFile" accept=".json" />
    <div class="file-name" id="fileName"></div>
  </div>

  <div class="form-group">
    <label for="targetFields">🎯 目标字段列表 (数组格式):</label>
    <textarea id="targetFields" placeholder='["productId", "name", "currentPrice", "marketPrice"]' style="height: 80px;"></textarea>
  </div>

  <div class="form-group">
    <label>📝 字段预览:</label>
    <textarea id="fieldPreview" placeholder="上传文件后显示原字段" readonly></textarea>
  </div>

  <div class="button-group">
    <button id="convertBtn">🚀 开始转换</button>
    <button id="settingsBtn">⚙️ 设置</button>
    <button id="resetBtn" style="background-color: #f44336;">🔄 重置</button>
  </div>

  <div class="form-group">
    <label for="outputJson">✅ 转换结果:</label>
    <textarea id="outputJson" placeholder="转换结果将显示在这里" readonly></textarea>
  </div>

  <button id="downloadBtn" style="display: none;">💾 下载JSON文件</button>
  
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
